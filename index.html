<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>XiaoLing</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            position: relative;
            min-height: 100vh;
            background-color: transparent;
            font-family: system-ui, -apple-system,'Segoe UI', sans-serif;
            display:flex;
            flex-direction: column;
            align-items:center;
            padding: 2rem 1rem;
        }

        body::before{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background-image:url('images/mmm.jpg');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            filter:blur(5px);/*模糊强度*/
            z-index:-1;
            transform: scale(1.05);
        }
        .content{
            background-color: rgba(255, 255, 255, 0.3);/*透明度和背景色*/
            border-radius: 32px;
            padding: 2rem 3rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        @media (max-width:600px){
            .content{
                padding: 1.5rem;
            }
            .github-btn{
                font-size: 36px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="content">
        <h1 style="text-align:center;">你好我是<span style="background: linear-gradient(to right, #ff0000, #00f2ff); -webkit-background-clip:text; background-clip: text; -webkit-text-fill-color: transparent;">霄凌XiaoLing</span>
        </h1>
        <a href="https://github.com/XiaoLing0054" style="display: block;width: fit-content;margin: 0 auto;font-size:50px;color:#00f2ff;background-color:black;">我的GitHub主页</a>
    </div>
</body>

</html>
